name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ramirez
          POSTGRES_PASSWORD: ramirez_test_password
          POSTGRES_DB: ramirez_atelier_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ramirez:ramirez_test_password@localhost:5432/ramirez_atelier_test?schema=public
      DIRECT_URL: postgresql://ramirez:ramirez_test_password@localhost:5432/ramirez_atelier_test?schema=public
      SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Prisma seed
        run: npx prisma db seed

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

  docker-build:
    needs: [verify]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build immagine Docker
        run: docker build -t ramirez-atelier:${{ github.sha }} .
      # Nota: push verso un registry e deploy verso Staging/Production non sono
      # implementati in questo incremento - stessa decisione presa per ArtigianOS,
      # in attesa della scelta del provider di hosting (v. README).
